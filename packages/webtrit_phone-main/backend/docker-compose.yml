version: '3.9'
services:

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: webtrit
      MYSQL_USER: webtrit
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build: .
    restart: always
    env_file: .env
    environment:
      DB_HOST: mysql
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data:
