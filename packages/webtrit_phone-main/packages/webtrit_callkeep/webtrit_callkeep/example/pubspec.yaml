name: webtrit_callkeep_example
description: Demonstrates how to use the callkeep plugin.
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  webtrit_callkeep:
    path: ../
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  go_router: ^16.3.0
  bloc: ^9.1.0
  flutter_bloc: ^9.1.1
  clock: ^1.1.2
  logging: ^1.3.0
  logging_appenders: ^1.4.0+1
  fluttertoast: ^9.0.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  build_runner: ^2.10.1
  freezed: ^3.2.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
