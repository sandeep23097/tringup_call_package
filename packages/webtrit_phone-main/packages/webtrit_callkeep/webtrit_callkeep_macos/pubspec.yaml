name: webtrit_callkeep_macos
description: MacOS implementation of the webtrit_callkeep plugin
version: 0.0.0+0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

flutter:
  plugin:
    implements: webtrit_callkeep
    platforms:
      macos:
        pluginClass: WebtritCallkeepPlugin
        dartPluginClass: WebtritCallkeepMacOS

dependencies:
  flutter:
    sdk: flutter
  webtrit_callkeep_platform_interface:
    path: ../webtrit_callkeep_platform_interface

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0
