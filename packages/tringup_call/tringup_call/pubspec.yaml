name: tringup_call
description: Drop-in call package — embed full WebRTC calling into any Flutter app.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: ^3.19.0

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_webrtc: 1.3.0
#  flutter_webrtc:
#    git:
#      url: https://github.com/WebTrit/flutter-webrtc.git
#      ref: main_ext_rebase_10.07.25
  webtrit_phone:
    path: ../webtrit_phone-main
  webtrit_api:
    path: ../webtrit_phone-main/packages/webtrit_api
  webtrit_callkeep:
    git:
      url: https://github.com/WebTrit/webtrit_callkeep.git
      ref: release/0.4.1
      path: webtrit_callkeep
  ssl_certificates:
    path: ../webtrit_phone-main/packages/ssl_certificates
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.0.0
  livekit_client: ^2.6.4
  http: ^1.2.0
